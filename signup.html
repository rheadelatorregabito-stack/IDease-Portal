<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up</title>
    <style>
:root {
    --bg-gradient: linear-gradient(110deg, #1A214B 0%, #dfe1ea 100%);
    --card-bg: #ffffff;
    --card-shadow: 0 4px 20px rgba(0,0,0,0.15);
    --text-primary: #000000;
    --text-secondary: #555;
    --input-bg: #fafafa;
    --input-border: #ccc;
    --input-focus: #1b234b;
    --btn-bg: #5d6fd2;
    --btn-hover: #4b5ecc;
    --link-color: #4b8acb;
}

body.dark-mode {
    --bg-gradient: linear-gradient(110deg, #0d0d0d 0%, #1a1a1a 100%);
    --card-bg: #2a2a2a;
    --card-shadow: 0 4px 20px rgba(0,0,0,0.5);
    --text-primary: #ffffff;
    --text-secondary: #d0d0d0;
    --input-bg: #333333;
    --input-border: #444444;
    --input-focus: #5d6fd2;
    --btn-bg: #5d6fd2;
    --btn-hover: #4b5ecc;
    --link-color: #7ba3d4;
}

body {
    margin: 0;
    padding: 0;
    font-family: "Poppins", sans-serif;
    background: var(--bg-gradient);
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: flex-start;
    color: var(--text-primary);
}
.auth-card {
    width: 420px;
    background: var(--card-bg);
    margin-top: 2.5rem;
    padding: 40px;
    border-radius: 22px;
    box-shadow: var(--card-shadow);
    text-align: center;
    color: var(--text-primary);
}
.auth-card h2 { 
    font-size: 24px; 
    margin-bottom: 10px; 
}
.auth-card p.sub-topic {
    font-size: 14px;
    color: var(--text-secondary);
    margin-bottom: 25px;
}
.input-row {
    display: flex;
    gap: 10px;
    margin-bottom: 18px;
    justify-content: center;
}
.input-row input {
    width: 40%;
    padding: 12px 15px;
    border-radius: 10px;
    border: 1px solid var(--input-border);
    background: var(--input-bg);
    color: var(--text-primary);
    font-size: 14px;
    outline: none;
}
.input-row input:focus {
    border-color: var(--input-focus);
    box-shadow: 0 0 5px rgba(93,111,210,0.3);
}
.input-box { 
    width: 100%; 
    margin-bottom: 18px; 
    display: flex;
    justify-content: center;
}
.input-box input {
    width: 80%;
    padding: 12px 15px;
    border-radius: 10px;
    border: 1px solid var(--input-border);
    background: var(--input-bg);
    color: var(--text-primary);
    font-size: 14px;
    outline: none;
}
.input-box input:focus {
    border-color: var(--input-focus);
    box-shadow: 0 0 5px rgba(93,111,210,0.3);
}
.auth-btn {
    width: 100%;
    padding: 12px;
    background: var(--btn-bg);
    border: none;
    border-radius: 10px;
    font-size: 15px;
    color: white;
    cursor: pointer;
    margin-top: 5px;
}
.auth-btn:hover { background: var(--btn-hover); }
.auth-text { margin-top: 12px; font-size: 13px; color: var(--text-secondary); }
.auth-text a { color: var(--link-color); text-decoration: none; font-weight: 600; }
.auth-text a:hover { text-decoration: underline; }
    </style>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body>
    <div class="auth-card">
        <h2>SIGN UP</h2>
        <p class="sub-topic">Create a new account to access the system</p>

        <div class="input-row">
            <input type="text" id="firstName" placeholder="First Name">
            <input type="text" id="lastName" placeholder="Last Name">
        </div>
        <div class="input-box">
            <input type="text" id="studentId" placeholder="Enter your 6-digit Student ID" maxlength="6">
        </div>
        <div class="input-row" style="margin-bottom: 18px; gap: 10px; justify-content: center;">
            <select id="dept" style="width: 40%; padding: 12px 15px; border-radius: 10px; border: 1px solid var(--input-border); background: var(--input-bg); color: var(--text-primary); font-size: 14px;">
                <option value="">Select Department</option>
                <option value="cafnr">College of Agriculture, Fisheries and Natural Resources</option>
                <option value="cac">College of Arts and Communication</option>
                <option value="cba">College of Business Administration</option>
                <option value="coed">College of Education</option>
                <option value="coe">College of Engineering</option>
                <option value="col">College of Law</option>
                <option value="cnahs">College of Nursing and Allied Health Sciences</option>
                <option value="cos">College of Science</option>
                <option value="cvm">College of Veterinary Medicine</option>
            </select>
            <select id="program" style="width: 40%; padding: 12px 15px; border-radius: 10px; border: 1px solid var(--input-border); background: var(--input-bg); color: var(--text-primary); font-size: 14px;" disabled>
                <option value="">Select Program</option>
            </select>
        </div>
        <div class="input-box">
            <input type="email" id="email" placeholder="Enter your email address">
        </div>
        <div class="input-box">
            <input type="password" id="password" placeholder="Enter your password">
        </div>
        <div class="input-box">
            <input type="password" id="confirmPassword" placeholder="Confirm your password">
        </div>

        <button class="auth-btn" onclick="signupForm()">SIGN UP</button>

        <div class="auth-text">
            Already have an account? <a href="login.html">Login</a>
        </div>
    </div>

    <script>
        function signupForm() {
            const firstName = document.getElementById("firstName").value;
            const lastName = document.getElementById("lastName").value;
            const studentId = document.getElementById("studentId").value;
            const dept = document.getElementById("dept").value;
            const program = document.getElementById("program").value;
            const role = "student";
            const email = document.getElementById("email").value;
            const password = document.getElementById("password").value;
            const confirmPassword = document.getElementById("confirmPassword").value;

            if(!firstName || !lastName || !studentId || !email || !password || !confirmPassword) {
                alert("Please complete all fields.");
                return;
            }

            if(studentId.length !== 6) {
                alert("Student ID must be exactly 6 digits.");
                return;
            }

            if(!dept || !program) {
                alert("Please select your department and program.");
                return;
            }

            if(password !== confirmPassword) {
                alert("Passwords do not match.");
                return;
            }

            if(password.length < 6) {
                alert("Password must be at least 6 characters long.");
                return;
            }

            // Check if student ID already exists
            let students = [];
            try {
                const stored = localStorage.getItem("student_users");
                students = stored ? JSON.parse(stored) : [];
            } catch (parseError) {
                console.warn('Could not parse existing student_users:', parseError);
                students = [];
            }
            
            if(students.some(s => s.studentId === studentId)) {
                alert("This Student ID is already registered. Please login or use a different ID.");
                return;
            }

            try {
                // Create new student account
                const userData = {
                    firstName: firstName,
                    lastName: lastName,
                    surname: lastName,
                    studentId: studentId,
                    authEmail: email,
                    password: password,
                    accountType: role,
                    role: role,
                    dept: dept,
                    program: program,
                    activityHistory: [],
                    createdDate: new Date().toISOString()
                };

                // Add to student_users array
                students.push(userData);
                const serialized = JSON.stringify(students);
                localStorage.setItem("student_users", serialized);
                
                // Verify save was successful
                const verify = localStorage.getItem("student_users");
                if (!verify) {
                    throw new Error('Failed to save student account to localStorage');
                }
                
                console.log('Student account saved successfully:', studentId);
                alert("Account created successfully! Redirecting to login...");
                window.location.href = "login.html";
            } catch (error) {
                console.error('Error creating student account:', error);
                alert("Error creating account: " + error.message);
            }
        }

        const signupCourseMap = {
            cafnr: [
                "Bachelor of Science in Agribusiness",
                "Bachelor of Science in Agriculture",
                "Bachelor of Science in Fisheries",
                "Bachelor of Science in Forestry"
            ],
            cac: [
                "Bachelor of Arts in English Language Studies",
                "Bachelor of Arts in Literature and Cultural Studies",
                "Bachelor of Arts major in Political Science",
                "Bachelor of Arts major in Public Administration",
                "Bachelor of Arts major in Sociology",
                "Bachelor of Science in Community Development",
                "Bachelor of Science in Criminology",
                "Bachelor of Science in Development Communication"
            ],
            cba: [
                "Bachelor of Science in Accountancy",
                "Bachelor of Science in Business Administration",
                "Bachelor of Science in Business Economics",
                "Bachelor of Science in Entrepreneurship",
                "Bachelor of Science in Hospitality Management"
            ],
            coed: [
                "Bachelor of Elementary Education",
                "Bachelor of Elementary Technology and Livelihood Education",
                "Bachelor of Secondary Education"
            ],
            coe: [
                "Bachelor of Engineering Technology",
                "Bachelor of Science in Agricultural and Biosystems Engineering",
                "Bachelor of Science in Civil Engineering",
                "Bachelor of Science in Electrical Engineering",
                "Bachelor of Science in Mechanical Engineering"
            ],
            col: ["Bachelor of Laws"],
            cnahs: [
                "Bachelor of Science in Nursing",
                "Bachelor of Science in Radiologic Technology"
            ],
            cos: [
                "Bachelor of Science in Biology",
                "Bachelor of Science in Chemistry",
                "Bachelor of Science in Environmental Science",
                "Bachelor of Science in Information Technology",
                "Bachelor of Science in Marine Biology",
                "Bachelor of Science in Mathematics"
            ],
            cvm: [
                "Bachelor of Science in Meat Technology",
                "Doctor of Veterinary Medicine"
            ]
        };

        function populateSignupProgramOptions(department) {
            const programElement = document.getElementById('program');
            programElement.innerHTML = '<option value="">Select Program</option>';
            if (!department || !signupCourseMap[department]) {
                programElement.disabled = true;
                return;
            }
            signupCourseMap[department].forEach(program => {
                const option = document.createElement('option');
                option.value = program.toLowerCase().replace(/\s+/g, '_');
                option.textContent = program;
                programElement.appendChild(option);
            });
            programElement.disabled = false;
        }

        document.addEventListener('DOMContentLoaded', () => {
            const deptSelect = document.getElementById('dept');
            if (deptSelect) {
                deptSelect.addEventListener('change', function() {
                    populateSignupProgramOptions(this.value);
                });
            }

          try {
            const darkModeEnabled = localStorage.getItem('pref-darkMode') === '1';
            if (darkModeEnabled) {
              document.body.classList.add('dark-mode');
            }

            // Ensure student_users array exists in localStorage
            if (!localStorage.getItem('student_users')) {
              localStorage.setItem('student_users', JSON.stringify([]));
            }
          } catch(e) {}
        });
    </script>
</body>
</html>
